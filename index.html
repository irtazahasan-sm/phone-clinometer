<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Phone Clinometer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Phone Clinometer</h1>
            <p>Measure heights using your phone's tilt sensor</p>
        </header>

        <main>
            <div id="completed-steps" class="completed-steps"></div>

            <div id="step-indicator" class="step-indicator">Step 1 of 3</div>

            <!-- Shared viewfinder (shown during steps 2 and 3) -->
            <div id="viewfinder" class="viewfinder hidden">
                <video id="camera" autoplay playsinline></video>
                <div class="crosshair">
                    <div class="crosshair-h"></div>
                    <div class="crosshair-v"></div>
                    <div class="crosshair-dot"></div>
                </div>
                <div id="live-angle" class="angle-overlay">Tilt angle: --</div>
            </div>

            <div id="angle-fallback" class="angle-display hidden">
                <div id="live-angle-fallback">Tilt angle: --</div>
            </div>

            <!-- Step 1: Distance and height -->
            <section id="step-1" class="step active">
                <div class="input-section">
                    <label for="distance">Distance to target (feet):</label>
                    <input id="distance" type="number" placeholder="Enter distance" min="1" step="0.1">
                </div>
                <div class="input-section">
                    <label for="user-height">Your height (feet):</label>
                    <input id="user-height" type="number" placeholder="e.g. 5.8" min="1" max="8" step="0.1">
                </div>
                <button id="btn-next-1" class="primary-btn">Next</button>
            </section>

            <!-- Step 2: Top angle -->
            <section id="step-2" class="step">
                <p class="step-instruction">Aim at the top of the object and record the angle.</p>
                <button id="btn-top" class="primary-btn">Record Top Angle</button>
            </section>

            <!-- Result -->
            <section id="step-result" class="step">
                <div id="result" class="result-display"></div>
                <button id="btn-measure-again" class="primary-btn">Measure Again</button>
            </section>

            <div id="status" class="status-message"></div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
